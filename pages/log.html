<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drift — Log</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>Drift</h1>
      <span class="tagline">Sleep forecast for your day</span>
      <div class="menu-wrap" id="menu-wrap">
        <button class="menu-trigger" id="menu-trigger" onclick="toggleMenu()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </button>
        <div class="menu-dropdown" id="menu-dropdown">
          <a href="/pages/profile.html" class="menu-item">Profile</a>
          <div class="menu-divider"></div>
          <button class="menu-item menu-item-danger" onclick="logout()">Sign out</button>
        </div>
      </div>
    </div>
    <nav class="tabs">
      <a href="/pages/log.html" class="tab-link active">Log</a>
      <a href="/pages/forecast.html" class="tab-link">Forecast</a>
      <span class="tab-link disabled">Recommendations <span class="soon">soon</span></span>
    </nav>
  </header>

  <main>
    <div class="card">
      <h2>Quick log</h2>
      <div class="quick-add" id="quick-add"></div>
    </div>

    <div class="card">
      <h2>Custom entry</h2>
      <div class="form-row">
        <select id="form-type"></select>
        <input id="form-amount" type="text" placeholder="Amount" />
        <input id="form-time" type="time" />
        <button class="btn-primary" id="form-add">Add</button>
      </div>
    </div>

    <div class="card">
      <h2>Today</h2>
      <ul class="events-list" id="events-list"></ul>
    </div>
  </main>

  <script src="/js/types.js"></script>
  <script src="/js/time.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/render-log.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/log-page.js"></script>
</body>
</html>
