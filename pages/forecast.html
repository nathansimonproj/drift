<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drift — Forecast</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>Drift</h1>
      <span class="tagline">Sleep forecast for your day</span>
      <div class="menu-wrap" id="menu-wrap">
        <button class="menu-trigger" id="menu-trigger" onclick="toggleMenu()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </button>
        <div class="menu-dropdown" id="menu-dropdown">
          <a href="/pages/profile.html" class="menu-item">Profile</a>
          <div class="menu-divider"></div>
          <button class="menu-item menu-item-danger" onclick="logout()">Sign out</button>
        </div>
      </div>
    </div>
    <nav class="tabs">
      <a href="/pages/log.html" class="tab-link">Log</a>
      <a href="/pages/forecast.html" class="tab-link active">Forecast</a>
      <span class="tab-link disabled">Recommendations <span class="soon">soon</span></span>
    </nav>
  </header>

  <main>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-actual" onclick="setMode('actual')">Actual</button>
      <button class="mode-btn" id="btn-whatif" onclick="setMode('whatif')">What If</button>
    </div>

    <div class="card" id="whatif-panel" style="display:none">
      <div class="whatif-card-header">
        <h2>Hypothetical events</h2>
        <button class="whatif-clear" onclick="clearWhatIf()">Clear all</button>
      </div>
      <div class="quick-add" id="whatif-quick-add"></div>
      <div class="form-row whatif-form-row">
        <select id="whatif-type"></select>
        <input id="whatif-amount" type="number" placeholder="Amount" />
        <input id="whatif-time" type="time" />
        <button class="btn-primary" id="whatif-add">Add</button>
      </div>
      <ul class="events-list" id="whatif-events-list"></ul>
    </div>

    <div class="card">
      <div class="forecast-hero">
        <div class="score" id="hero-score">—</div>
        <div class="label">Sleep forecast at bedtime</div>
        <div class="interpretation" id="hero-interpretation"></div>
        <div class="bedtime" id="hero-bedtime"></div>
      </div>
    </div>

    <div class="card">
      <h2>What's affecting you</h2>
      <div class="breakdown" id="breakdown"></div>
    </div>

    <div class="card">
      <h2>Decay timeline</h2>
      <div class="chart-wrap">
        <canvas id="decay-chart"></canvas>
      </div>
      <div class="chart-legend">
        Forecast score from now until 2 hours past bedtime. The dashed line marks your target bedtime.
      </div>
    </div>
  </main>

  <script src="/js/types.js"></script>
  <script src="/js/time.js"></script>
  <script src="/js/decay.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/render-forecast.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/forecast-page.js"></script>
</body>
</html>
